# Minimal ergo config for e2e testing
# WebSocket+TLS on 8097 (browser) — port 6697 is blocked by Chrome (ERR_UNSAFE_PORT)
# Plain IRC on 6667 (helper bots via TCP, unaffected by browser port blocks)

network:
    name: E2ETestNet

server:
    name: ergo.test
    listeners:
        ":6667":
        ":8097":
            websocket: true
            tls:
                cert: /ircd/tls/cert.pem
                key: /ircd/tls/key.pem
    websockets:
        allowed-origins: []
    casemapping: "ascii"
    enforce-utf8: true
    lookup-hostnames: false
    check-ident: false
    coerce-ident: '~u'
    motd: /ircd/ergo.motd
    motd-formatting: true
    max-sendq: 96k
    compatibility:
        force-trailing: true
        send-unprefixed-sasl: true
        allow-truncation: false
    ip-limits:
        count: false
        throttle: false
        exempted:
            - "0.0.0.0/0"
            - "::/0"
    ip-cloaking:
        enabled: false
    suppress-lusers: false

accounts:
    authentication-enabled: false
    registration:
        enabled: false
    login-throttling:
        enabled: false
    skip-server-password: true
    login-via-pass-command: false
    require-sasl:
        enabled: false
    nick-reservation:
        enabled: false
        guest-nickname-format: "Guest-*"
        force-guest-format: false
        force-nick-equals-account: false
        forbid-anonymous-nick-changes: false
    multiclient:
        enabled: false
    vhosts:
        enabled: false
    default-user-modes: ""

channels:
    default-modes: +nt
    max-channels-per-client: 100
    operator-only-creation: false
    registration:
        enabled: false
    list-delay: 0s

oper-classes:
    "server-admin":
        title: Server Admin
        capabilities:
            - "*"

opers: {}

logging:
    -
        method: stderr
        type: "* -userinput -useroutput"
        level: warn

datastore:
    path: /ircd/ircd.db
    autoupgrade: true

languages:
    enabled: false

limits:
    nicklen: 32
    identlen: 20
    realnamelen: 150
    channellen: 64
    awaylen: 390
    kicklen: 390
    topiclen: 390
    monitor-entries: 100
    whowas-entries: 100
    chan-list-modes: 100
    registration-messages: 1024
    multiline:
        max-bytes: 4096
        max-lines: 100

fakelag:
    enabled: false

history:
    enabled: true
    channel-length: 2048
    client-length: 256
    autoresize-window: 1d
    autoreplay-on-join: 0
    chathistory-maxmessages: 100
    znc-maxmessages: 100
    restrictions:
        expire-time: 1d
        query-cutoff: 'none'
    persistent:
        enabled: false
    tagmsg-storage:
        default: false

lock-file: ""

allow-environment-overrides: false
